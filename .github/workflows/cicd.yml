name: workflow-1
on:
  push: 
    branches:
      - main 


env: 
  registry: docker.io
  APP_NAME: java-cicd-app
  APP_VERSION: 1.1.0


jobs:
  
  Code_Checkout :
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: |
          echo "Cleaning workspace..."
          rm -rf ${{ github.workspace }}/* || true
          
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Code Fetched Message
        run: echo "the Code is fetched to the runner"

  Build:

    needs: Code_Checkout
    runs-on: self-hosted    
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Building The Application with Maven
        uses: actions/setup-java@v4
        with:
         distribution: temurin
         java-version: '17'

      - name: Checking Maven version
        run: mvn --version

      - name: Cleaning the Old Artifacts
        run: mvn clean package -DskipTests

      - name: storing the new Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: target
          path: target/  

  Code_Analysis:
    needs: Build
    runs-on: self-hosted
    steps:
      - name: Downlaoding the Artifacts
        uses: actions/download-artifact@v4

      - name: Code Code_Analysis
        run: echo "checking the  code quality and Leakage"

      - name: user info
        run: echo "whoami" 
      - name: Build Docker Image
        run: |
          DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ github.run_number }}
          sudo docker build -t "$DOCKER_IMAGE" .

      - name: Print Docker Image
        run: echo $DOCKER_IMAGE
      - name: Sudo docker images 
        run: sudo docker images                          
  
  Docker_Image:
    needs: Code_Analysis
    runs-on: self-hosted
    steps:
      - name: Print Docker Image
        run: echo $DOCKER_IMAGE
  

  Push_To_DockerHUB:
    needs: Docker_Image
    runs-on: self-hosted 
    steps:
      - name: Login to Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Pushing  image to Dockerhub
        run: |
          docker push ${{secrets.DOCKER_USERNAME}}/${{env.APP_NAME}}:${{github.run_number}}

      - name: Deleting the docker image from the local
        run: |
          docker rmi ${{secrets.DOCKER_USERNAME}}/${{env.APP_NAME}}:${{github.run_number}} || true



  Sending_Notification:
    needs: |
      - Build
      - Code_Analysis
      - Docker_Image
      - Push_To_DockerHUB
    runs-on: self-hosted
    if: always()
    steps: 
      - name: Sending the Notification
        run: |
          curl -X POST \
          - H "Context-Type: application/json" \
          -d '{
            "text": "🚀 GitHub Actions Report

          Workflow: ${{ github.workflow }}
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Triggered By: ${{ github.actor }}
          Run Number: ${{ github.run_number }}

          BUILD: ${{ needs.Build.result }}
          CODE_ANALYSIS: ${{ needs.Code_Analysis.result }}
          DOCKER_Image: ${{ needs.Docker_Image.result }}
          PUSH_To_Dockerhub: ${{needs.Push_To_DockerHUB}}

          View Run:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' \ 
          ${{secrets.TEAM_WEBHOOL_URL}}         
        
name: workflow-1
on:
  push: 
    branches:
      - main 


env: 
  registry: docker.io
  APP_NAME: java-cicd-app
  APP_VERSION: 1.1.0


jobs:
  Code_Checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Code Fetched Message
        run: echo"the Code is fetched to the runner"

      - name: Set Docker Image
        run: |
          echo "DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ github.run_number }}" >> $GITHUB_ENV  
      - name: Print Docker Image
        run: echo $DOCKER_IMAGE
  Build:
    needs: Code_Checkout
    runs-on: ubuntu-latest
    steps:
      - name: Building The Application with Maven
        uses: actions/setup-java@v4
        with:
          distrubution: temurine
          java-version: 17

      - name: Checking Maven version
        run: mvn --version

      - name: Cleaning the Old Artifacts
        run: mvn clean package -DskipTests

      - name: storing the new Artifacts
        uses: actions/uplaod-artifact@v4
        with:
          name: target
          path: target/  
  Code_Analysis:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Downlaoding the Artifacts
        uses: actions/download-artifact@v4

      - name: Code Code_Analysis
        run: echo "checking the  code quality and Leakage"                        
  
  Docker_Image:
    needs: Code_Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Building the Docker Image
        run: docker build -t ${{env.DOCKER_IMAGE}} .

  Push_To_DockerHUB:
    needs: Docker_Image
    runs-on: ubuntu-latest
    if: github.ref == 'ref/heads/main'
    steps:
      - name: Login to Dockerhub
        uses: docker/login-actions@v4
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Pushing  image to Dockerhub
        run: |
          docker push ${{secrets.DOCKER_USERNAME}}/${{env.APP_NAME}}:${{github.run_number}}


  POST:
    needs: Push_To_DockerHUB
    runs-on: ubuntu-latest
    if: always()
    steps: 
      - name: Execution Message
        run: echo "The WorkFlow Execution is completed successfully"         
        